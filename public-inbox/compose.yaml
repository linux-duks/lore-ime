version: '3'

services:
  nginx:
    image: docker.angie.software/angie:minimal
    ports:
      - "8088:80"
      - "8443:443"
      - "8119:119"
    volumes:
      - ./nginx/angie.conf:/etc/angie/angie.conf:z
      - ./acme:/var/lib/angie/acme:z
      - ./216dark.css:/var/www/static/theme.css:z
    depends_on:
      - public-inbox
    restart: unless-stopped
  public-inbox:
    restart: unless-stopped
    build:
      context: .
      dockerfile: ./Containerfile
      args:
        USER_ID: '${UID:-1000}'
        GROUP_ID: '${UID:-1000}'

    user: "${UID}:${GID}"
    # userns_mode: "keep-id"
    # userns_mode: "keep-id:uid=1000,gid=1000"
    environment:
      - DEBUG=false
      - PI_CONFIG=/etc/public-inbox/config
      - PI_DATA_DIR=/data
      - IMAP_FOLDER=INBOX
      - IMAP_SSL=true
      - IMAP_INTERVAL=3600
      - SA_MAX_MAIL_SIZE 4096000
      
    volumes:
      - ../data/:/data/:z
      - ./216dark.css:/static/theme.css:z
      - ./scripts:/app:z
      - ./pi-configs/:/etc/public-inbox/:z
      - ./logs/:/var/log/public-inbox/:z

    # Make sure public-inbox is running in the foreground
    command: >
      bash ./start.sh

networks:
  default:
    driver: bridge

