version: '3'

# Usage:
#   docker compose --profile mirroring up -d                          # clone mode (default)
#   GROKMIRROR_MODE=indexed docker compose --profile mirroring up -d  # indexed mode (with public-inbox hooks)
#
# After cloning with clone mode, run manual indexing:
#   docker compose run --rm indexer

services:
  grokmirror:
    profiles: ["mirroring"]
    build:
      # uses the parent as context to install both grokmirror and public-inbox from source
      context: .
      dockerfile: ./Containerfile

    environment:
      - HOME=/tmp
      - GROKMIRROR_MODE=${GROKMIRROR_MODE:-clone}

    # stdin_open: true
    user: "${UID}:${GID}"
    volumes:
    - ./configs/grokmirror/rcpassos-${GROKMIRROR_MODE:-clone}.conf:/config/lore.conf:z
    - ./configs/pi-configs/:/etc/public-inbox/:z
    - ./data/:/data:z
    - ./scripts:/scripts:z
    command: grok-pull -v -c /config/lore.conf
    stop_grace_period: 1m30s

  # Run manual indexing: docker compose run --rm indexer
  indexer:
    profiles: ["manual"]
    build:
      context: .
      dockerfile: ./Containerfile

    environment:
      - HOME=/tmp
      - PI_CONFIG=/etc/public-inbox/config

    user: "${UID}:${GID}"
    volumes:
    - ./configs/pi-configs/:/etc/public-inbox/:z
    - ./data/:/data:z
    - ./scripts:/scripts:z
    command: bash /scripts/index-cloned-repos.sh -o https://lore.kernel.org

  nginx:
    profiles: ["hosting"]
    image: docker.angie.software/angie:minimal
    ports:
      - "8088:80"
      - "8443:443"
      - "8119:119"
    volumes:
      - ./configs/nginx/angie.conf:/etc/angie/angie.conf:z
      - ./acme:/var/lib/angie/acme:z
      - ./configs/pi-configs/216dark.css:/var/www/static/theme.css:z
    depends_on:
      - public-inbox
    restart: unless-stopped

  public-inbox:
    profiles: ["hosting"]
    restart: unless-stopped
    build:
      context: .
      dockerfile: ./Containerfile
      args:
        USER_ID: '${UID:-1000}'
        GROUP_ID: '${UID:-1000}'

    user: "${UID}:${GID}"
    # userns_mode: "keep-id"
    # userns_mode: "keep-id:uid=1000,gid=1000"
    environment:
      - DEBUG=false
      - PI_CONFIG=/etc/public-inbox/config
      - PI_DATA_DIR=/data
      - IMAP_FOLDER=INBOX
      - IMAP_SSL=true
      - IMAP_INTERVAL=3600
      - SA_MAX_MAIL_SIZE 4096000
      
    volumes:
      - ./data/:/data/:z
      - ./configs/pi-configs/216dark.css:/static/theme.css:z
      - ./scripts:/scripts:z
      - ./configs/pi-configs/:/etc/public-inbox/:z
      - ./logs/:/var/log/public-inbox/:z

    # Make sure public-inbox is running in the foreground
    command: >
      bash /scripts/start-public-inbox.sh

